name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-nextest

      - name: Verify release tag
        run: |
          set -euo pipefail

          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release tags must use vX.Y.Z" >&2
            exit 1
          fi

          tag_version="${GITHUB_REF_NAME#v}"
          crate_version="$(cargo pkgid | sed -E 's/.*#([0-9A-Za-z.+-]+)$/\1/')"

          if [[ "${tag_version}" != "${crate_version}" ]]; then
            echo "tag version ${tag_version} does not match crate version ${crate_version}" >&2
            exit 1
          fi

      - name: Run test suite
        run: just test

      - name: Verify package
        run: cargo package --locked

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "GitHub release ${GITHUB_REF_NAME} already exists"
            exit 0
          fi

          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --generate-notes \
            --latest
