name: CI

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-nextest,cargo-llvm-cov

      - name: Install js-ref dependencies
        run: bun install --cwd tools/js-ref --frozen-lockfile

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Create coverage output directory
        run: mkdir -p target/llvm-cov

      - name: Run test suite with coverage
        run: cargo llvm-cov nextest --config-file .config/nextest.toml --cargo-quiet --status-level fail --final-status-level fail --failure-output final --success-output never --show-progress none --no-tests pass --lcov --output-path target/llvm-cov/lcov.info

      - name: Run doc tests
        run: cargo test --doc --quiet

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: target/llvm-cov/lcov.info
          disable_search: true
          fail_ci_if_error: true
          verbose: true

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify release tag
        id: verify_tag
        run: |
          set -euo pipefail

          semver_pattern='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*))*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'

          if [[ ! "${GITHUB_REF_NAME}" =~ ${semver_pattern} ]]; then
            echo "release tags must use v<semver>, for example v0.1.0 or v0.1.0-rc.1" >&2
            exit 1
          fi

          tag_version="${GITHUB_REF_NAME#v}"
          crate_version="$(cargo pkgid | sed -E 's/.*#([0-9A-Za-z.+-]+)$/\1/')"

          if [[ "${tag_version}" != "${crate_version}" ]]; then
            echo "tag version ${tag_version} does not match crate version ${crate_version}" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "is_stable=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_stable=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Verify package
        run: cargo package --locked

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: ${{ steps.verify_tag.outputs.is_stable }}
